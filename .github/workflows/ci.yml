name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build & Test Backend
        run: mvn -B verify -pl backend

  chantier-ui:
    name: Chantier UI Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chantier-ui
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: chantier-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: CI=true npm test -- --watchAll=false

      - name: Build
        run: npm run build

  client-ui:
    name: Client UI Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client-ui
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: CI=true npm test -- --watchAll=false

      - name: Build
        run: npm run build

  technicien-ui:
    name: Technicien UI Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: technicien-ui
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: technicien-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: CI=true npm test -- --watchAll=false

      - name: Build
        run: npm run build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f backend/Dockerfile -t moussaillon/backend:test .

      - name: Build chantier-ui image
        run: docker build -t moussaillon/chantier-ui:test chantier-ui/

      - name: Build client-ui image
        run: docker build -t moussaillon/client-ui:test client-ui/

      - name: Build technicien-ui image
        run: docker build -t moussaillon/technicien-ui:test technicien-ui/

      - name: Verify backend starts
        run: |
          docker run -d --name backend-test -p 8080:8080 moussaillon/backend:test
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/q/health/ready; then
              echo "Backend is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Backend failed to start"
          docker logs backend-test
          exit 1

      - name: Verify frontend images serve content
        run: |
          docker run -d --name chantier-test -p 3000:80 moussaillon/chantier-ui:test
          docker run -d --name client-test -p 3001:80 moussaillon/client-ui:test
          docker run -d --name technicien-test -p 3002:80 moussaillon/technicien-ui:test
          declare -A ports=([chantier-ui]=3000 [client-ui]=3001 [technicien-ui]=3002)
          for name in "${!ports[@]}"; do
            port=${ports[$name]}
            for i in $(seq 1 15); do
              if curl -sf http://localhost:$port/ > /dev/null; then
                echo "$name OK"
                break
              fi
              if [ $i -eq 15 ]; then
                echo "$name failed to respond on port $port"
                exit 1
              fi
              sleep 2
            done
          done

  helm:
    name: Helm Chart Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.0

      - name: Lint chart
        run: helm lint helm/moussaillon/

      - name: Template with default values
        run: helm template moussaillon helm/moussaillon/

      - name: Template with ingress enabled
        run: helm template moussaillon helm/moussaillon/ --set ingress.enabled=true

      - name: Validate manifests with kubeconform
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz | tar xz
          helm template moussaillon helm/moussaillon/ | ./kubeconform -strict -summary
          helm template moussaillon helm/moussaillon/ --set ingress.enabled=true | ./kubeconform -strict -summary
