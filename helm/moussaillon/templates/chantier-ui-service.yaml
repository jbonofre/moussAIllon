apiVersion: v1
kind: Service
metadata:
  name: {{ include "moussaillon.fullname" . }}-chantier-ui
  labels:
    {{- include "moussaillon.labels" . | nindent 4 }}
    app.kubernetes.io/component: chantier-ui
spec:
  type: {{ .Values.chantierUi.service.type }}
  ports:
    - port: {{ .Values.chantierUi.service.port }}
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/component: chantier-ui
    app.kubernetes.io/instance: {{ .Release.Name }}
